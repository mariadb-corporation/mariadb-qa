# ========================================= User configurable variables to enable query correctness testing ======================
# Note: if/when using RocksDB as a primary or secondary engine, it must be spelled correctly as: RocksDB. Variations like: rocksdb will cause failures in this script
QUERY_CORRECTNESS_TESTING=0                                    # Set to 1 to enable query correctness testing. Normally set to 0 (off)
QUERY_CORRECTNESS_MODE=2                                       # Sets the result comparison modes: 0: errors/warnings, 1: 'changed rows' comparision, 2: actual query results
QC_NR_OF_STATEMENTS_PER_TRIAL=2000                             # Number of queries sampled/used per trial (executed against both engines below, then results are compared)
QC_PRI_ENGINE=RocksDB                                          # Primary comparison engine for query correctness testing. Make sure to match this with MYEXTRA ('left engine')
QC_SEC_ENGINE=InnoDB                                           # Secondary comparison engine for query correctness testing. Make sure to match this with MYEXTRA2 ('right engine')
MYEXTRA2="--default-tmp-storage-engine=MyISAM --default-storage-engine=InnoDB --collation-server=latin1_bin"                          # Used for secondary mysqld (RocksDB testing)

# ========================================= User configurable variables to enable query duration testing =========================
QUERY_DURATION_TESTING=0                                       # Partially implemented only. Needs further development.

# ========================================= User configurable variables to enable Valgrind testing only ==========================
VALGRIND_RUN=0                                                 # Set to 1 to make this a Valgrind run. Do not change VALGRIND_CMD unless you fully understand the change being made
VALGRIND_CMD="valgrind --suppressions=$(ls ${BASEDIR}/m*test/valgrind.supp 2>/dev/null | head -n1) --num-callers=40 --show-reachable=yes --track-origins=yes"
VALGRIND_ERRORS_FOUND=0

# ========================================= User configurable variables to enable encryption ==========================
ENABLE_ENCRYPTION=0                                            # Set to 1 to enable encryption using the file-key-management plugin with SHA1 or SHA2, as applicable, automatically
MYENCRYPTION="--aria-encrypt-tables=ON --innodb-encrypt-log=ON --innodb_encrypt_tables=ON"  # For example "--aria-encrypt-tables=ON --innodb-encrypt-log=ON --innodb_encrypt_tables=ON"

# ========================================= User configurable variables to enable crash recovery testing only ====================
CRASH_RECOVERY_TESTING=0                                       # Set to 1 to make this a crash recovery test (terminates server after x seconds and then attempts crash recovery)
CRASH_RECOVERY_KILL_BEFORE_END_SEC=25                          # Kill the server x seconds before the end of the trial. Ensure trial duration is somewhat larger then this

# ========================================= User configurable variables to enable mariadb-binlog recovery testing only ===========
MARIADB_BINLOG_RECOVERY_TESTING=0                              # Set to 1 to make this a mariadb-binlog receovery test

# ========================================= User configurable variables to configure PS testing only =============================
SKIP_JEMALLOC_FOR_PS=0                                         # Skip LD_PRELOAD'ing of JEMALLOC. Only indicated for testing PS without TokuDB against default memory manager

# ========================================= User configurable variables to enable/for Replication testing only ===========================
REPLICATION=0                                                  # Set to 1 to make this a Replication testing run
REPLICATION_SHUTDOWN_OR_KILL=0                                 # Set to 0 for normal shutdown and 1 for forcefully kill server using `kill -9` command, used only when CRASH_RECOVERY_TESTING is enabled
REPLICATION_SHUTDOWN_OR_KILL_TIMEOUT=70                        # x sec to shutdown/kill replication servers
#REPL_EXTRA="--gtid_strict_mode=1 --relay-log=relaylog"         # Extra parameters to pass to the master and the slave, besides MYEXTRA (both are used)
REPL_EXTRA=""         # Extra parameters to pass to the master and the slave, besides MYEXTRA (both are used)
#REPL_EXTRA="--gtid_strict_mode=1 --relay-log=relaylog --binlog_xa_two_phase=0"         # Extra parameters to pass to the master and the slave, besides MYEXTRA (both are used)
#REPL_EXTRA="--innodb_change_buffering=all --innodb_fast_shutdown=1 --sql_mode= --innodb_purge_threads=10 --gtid_strict_mode=1 --log_bin=binlog"
MASTER_EXTRA="--log_bin=binlog --binlog_format=STATEMENT --log_bin_trust_function_creators=1 --server_id=1"  # Extra parameters to pass to the master only
SLAVE_EXTRA="--slave-parallel-threads=10 --slave-parallel-max-queued=1073741827 --slave_run_triggers_for_rbr=LOGGING --slave_skip_errors=ALL --server_id=2"  # Extra parameters to pass to the slave only
ROTATE_BINLOG_FORMAT=1                                         # Rotate ROW > STATEMENT > MIXED for each next workdir/run. It is best to start 3 runs of opt and 3 runs of dbg, and to stick to a multiple of 3 for each (opt and dbg number of runs) to ensure that the binary log format distribution between opt and dbg is equal

