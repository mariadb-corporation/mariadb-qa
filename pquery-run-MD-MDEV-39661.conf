# ========================================= MDEV-38180 PRE_SHUFFLE_INTERLEAVE_SQL ===============================================
# Exercises XXH32 / XXH3 across literals, columns, NULL, empty, charsets, PADSPACE, partitioning,
# generated columns, indexes, prepared statements, stored functions, aggregation, expressions,
# binary data, very long inputs, and intentional illegal arg-type errors. \n-separated, single line.
PRE_SHUFFLE_INTERLEAVE_SQL="SELECT XXH32('abc');\nSELECT XXH3('abc');\nSELECT XXH32('');\nSELECT XXH3('');\nSELECT XXH32(NULL);\nSELECT XXH3(NULL);\nSELECT XXH32(REPEAT('a',100));\nSELECT XXH3(REPEAT('a',1000));\nSELECT XXH32(REPEAT('z',65535));\nSELECT XXH3(REPEAT('z',65535));\nSELECT XXH32(CONCAT('a','b','c'));\nSELECT XXH3(CONCAT('a','b','c'));\nSELECT XXH32(BINARY 'abc');\nSELECT XXH3(BINARY 'abc');\nSELECT XXH32(_utf8mb4 'caf\\xC3\\xA9' COLLATE utf8mb4_general_ci);\nSELECT XXH3(_utf8mb4 'caf\\xC3\\xA9' COLLATE utf8mb4_bin);\nSELECT XXH32(_latin1 'abc' COLLATE latin1_swedish_ci);\nSELECT XXH3(_latin1 'abc' COLLATE latin1_bin);\nSELECT XXH32(_koi8u 0x20 COLLATE koi8u_general_ci);\nSELECT XXH3(_koi8u 0x60 COLLATE koi8u_general_ci);\nSELECT XXH32(' ') = XXH32('    ') AS pad_eq;\nSELECT XXH3(' ') = XXH3('    ') AS pad_eq;\nSELECT XXH32(LEFT(MD5(RAND()),20));\nSELECT XXH3(LEFT(SHA1(RAND()),40));\nSELECT XXH32(UUID());\nSELECT XXH3(UUID());\nSELECT XXH32(HEX(0x010203));\nSELECT XXH3(HEX(0xdeadbeef));\nSELECT MOD(XXH32('abc'),7);\nSELECT MOD(XXH3('abc'),7);\nSELECT XXH32('abc') = 2154901205;\nSELECT XXH3('abc') = 2615927343983396622;\nSELECT IF(XXH3('a')>XXH3('b'),1,0);\nCREATE OR REPLACE TABLE t_xxh_a (c1 VARCHAR(50)) PARTITION BY KEY ALGORITHM=XXH32 (c1) PARTITIONS 7;\nCREATE OR REPLACE TABLE t_xxh_b (c1 VARCHAR(50)) PARTITION BY KEY ALGORITHM=XXH3 (c1) PARTITIONS 7;\nINSERT INTO t_xxh_a VALUES ('a'),('bb'),('ccc'),(''),(NULL);\nINSERT INTO t_xxh_b VALUES ('a'),('bb'),('ccc'),(''),(NULL);\nSELECT XXH32(c1), XXH3(c1) FROM t_xxh_a;\nSELECT XXH32(c1), XXH3(c1) FROM t_xxh_b;\nSELECT COUNT(DISTINCT XXH32(c1)) FROM t_xxh_a;\nSELECT COUNT(DISTINCT XXH3(c1)) FROM t_xxh_b;\nDROP TABLE IF EXISTS t_xxh_a;\nDROP TABLE IF EXISTS t_xxh_b;\nCREATE OR REPLACE TABLE t_xxh_v (d VARCHAR(50), h32 INT UNSIGNED AS (XXH32(d)) VIRTUAL, h3 BIGINT UNSIGNED AS (XXH3(d)) VIRTUAL);\nCREATE OR REPLACE TABLE t_xxh_s (d VARCHAR(50), h32 INT UNSIGNED AS (XXH32(d)) STORED, h3 BIGINT UNSIGNED AS (XXH3(d)) STORED, KEY(h32), KEY(h3));\nINSERT INTO t_xxh_v(d) VALUES ('alpha'),('beta'),(NULL);\nINSERT INTO t_xxh_s(d) VALUES ('alpha'),('beta'),(NULL);\nSELECT * FROM t_xxh_v;\nSELECT * FROM t_xxh_s;\nDROP TABLE IF EXISTS t_xxh_v;\nDROP TABLE IF EXISTS t_xxh_s;\nPREPARE pxh32 FROM 'SELECT XXH32(?)';\nPREPARE pxh3 FROM 'SELECT XXH3(?)';\nSET @s='abc';\nEXECUTE pxh32 USING @s;\nEXECUTE pxh3 USING @s;\nDEALLOCATE PREPARE pxh32;\nDEALLOCATE PREPARE pxh3;\nCREATE OR REPLACE FUNCTION fxh32(s VARCHAR(255)) RETURNS INT UNSIGNED DETERMINISTIC RETURN XXH32(s);\nCREATE OR REPLACE FUNCTION fxh3(s VARCHAR(255)) RETURNS BIGINT UNSIGNED DETERMINISTIC RETURN XXH3(s);\nSELECT fxh32('abc'), fxh3('abc');\nDROP FUNCTION IF EXISTS fxh32;\nDROP FUNCTION IF EXISTS fxh3;\nSELECT XXH32(CAST(1 AS CHAR));\nSELECT XXH3(CAST(NOW() AS CHAR));\nSELECT XXH32(JSON_EXTRACT('{\"a\":\"x\"}','$.a'));\nSELECT XXH3(JSON_UNQUOTE(JSON_EXTRACT('{\"a\":\"x\"}','$.a')));\nSELECT XXH32(GROUP_CONCAT('a','b','c'));\nSELECT XXH3(GROUP_CONCAT('a','b','c'));\nSELECT XXH32(123);\nSELECT XXH3(123);\nSELECT XXH32(NOW());\nSELECT XXH3(NOW());\nSELECT XXH32(CAST(0xDEADBEEF AS BINARY));\nSELECT XXH3(CAST(0xDEADBEEF AS BINARY));\nSELECT XXH32(CONCAT('a',NULL));\nSELECT XXH3(CONCAT('a',NULL));\nSELECT XXH32(NULLIF('x','x'));\nSELECT XXH3(IF(1,NULL,'a'));\nSELECT XXH32(CASE WHEN 1 THEN NULL END);\nSELECT XXH3(COALESCE(NULL,NULL));\nSELECT XXH32(SUBSTRING(NULL,1));\nSELECT XXH3((SELECT NULL));\nSELECT XXH32(REGEXP_REPLACE('a','a',''));\nSELECT XXH3(REGEXP_REPLACE('abc','.',''));\nSELECT XXH32(REGEXP_SUBSTR('abc','z'));\nSELECT XXH3(SUBSTRING('abc',10));\nSELECT XXH32(LEFT('abc',0));\nSELECT XXH3(TRIM(' ' FROM '   '));\nSELECT XXH32(REPEAT('a',0));\nSELECT XXH32(CONVERT('abc' USING ucs2));\nSELECT XXH3(CONVERT('abc' USING utf16));\nSELECT XXH32(_utf8mb4'abc' COLLATE utf8mb4_uca1400_ai_ci);\nSELECT XXH3(_utf8mb4'abc' COLLATE utf8mb4_bin);\nCREATE OR REPLACE TABLE t_xxh_bt (b BLOB, t TEXT, vb VARBINARY(20), e ENUM('a','b','c'), st SET('x','y'));\nINSERT INTO t_xxh_bt VALUES ('blob','text',0x0102,'b','x,y'),('','',0x00,'a','x'),(NULL,NULL,NULL,NULL,NULL);\nSELECT XXH32(b), XXH3(t), XXH32(vb), XXH3(e), XXH32(st) FROM t_xxh_bt;\nDROP TABLE IF EXISTS t_xxh_bt;\nCREATE OR REPLACE TABLE t_xxh_fi (d VARCHAR(30), h BIGINT UNSIGNED AS (XXH3(d)) STORED, KEY(h));\nINSERT INTO t_xxh_fi(d) VALUES ('alpha'),('beta'),(NULL),('');\nSELECT d FROM t_xxh_fi WHERE h=XXH3('beta');\nSELECT COUNT(*) FROM t_xxh_fi WHERE (XXH32(d) IS NULL)<>(d IS NULL);\nDROP TABLE IF EXISTS t_xxh_fi;\nWITH c AS (SELECT 'p' u UNION SELECT 'q') SELECT XXH3(u) FROM c;\nSELECT XXH32(d) IS NULL FROM (SELECT NULL d UNION SELECT 'x') q;\nSELECT XXH32(MAX(d)) FROM (SELECT 'm' d) z;\nSELECT c1, SUM(XXH32(c1)) OVER (ORDER BY c1) AS r FROM (SELECT 'a' c1 UNION SELECT 'b' c1) w;"
